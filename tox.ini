[testenv:py3.10-darwin]
basepython = python3.10
platform=^darwin$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.11-darwin]
basepython = python3.11
platform=^darwin$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.12-darwin]
basepython = python3.12
platform=^darwin$
usedevelop = True
deps = {[testenv]deps}
