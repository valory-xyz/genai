[testenv:py3.13-darwin]
basepython = python3.13
platform=^darwin$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.14-darwin]
basepython = python3.14
platform=^darwin$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:bandit]
skipsdist = True
skip_install = True
deps =
    pbr
    tomte[bandit]==0.6.5
commands =
    bandit -s B101 -r {env:SERVICE_SPECIFIC_PACKAGES}

[testenv:black]
skipsdist = True
skip_install = True
deps =
    tomte[black]==0.6.5
commands = black {env:SERVICE_SPECIFIC_PACKAGES}

[testenv:black-check]
skipsdist = True
skip_install = True
deps =
    tomte[black]==0.6.5
commands = black --check {env:SERVICE_SPECIFIC_PACKAGES}

[testenv:isort]
skipsdist = True
skip_install = True
deps =
    tomte[isort]==0.6.5
commands =
    isort {env:SERVICE_SPECIFIC_PACKAGES} --gitignore

[testenv:isort-check]
skipsdist = True
skip_install = True
deps =
    tomte[isort]==0.6.5
commands = isort --check-only --gitignore {env:SERVICE_SPECIFIC_PACKAGES}

[testenv:check-hash]
skipsdist = True
skip_install = True
deps = {[testenv]deps}
commands = python -m autonomy.cli packages lock --check {posargs}

[testenv:check-packages]
skipsdist = True
skip_install = True
deps = {[testenv]deps}
commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync
    autonomy check-packages

[testenv:check-dependencies]
skipsdist = True
usedevelop = True
commands =
    autonomy packages sync
    aea-helpers check-dependencies --check --exclude eth-account --exclude httpx

[testenv:flake8]
skipsdist = True
skip_install = True
deps =
    tomte[flake8]==0.6.5
    snowballstemmer==2.2.0
    pycodestyle==2.14.0
commands =
    flake8 \
    {env:SERVICE_SPECIFIC_PACKAGES}

[testenv:mypy]
skipsdist = True
skip_install = True
deps =
    {[testenv]deps}
    tomte[mypy]==0.6.5
commands =
    mypy {env:SERVICE_SPECIFIC_PACKAGES} --disallow-untyped-defs --config-file tox.ini

[testenv:pylint]
whitelist_externals = /bin/sh
skipsdist = True
deps =
    {[deps-packages]deps}
    tomte[pylint]==0.6.5
commands = pylint --ignore-patterns=".*_pb2.py" --disable=C0103,R0801,R0912,C0301,C0201,C0204,C0209,W1203,C0302,R1735,R1729,W0511 {env:SERVICE_SPECIFIC_PACKAGES}

[testenv:darglint]
skipsdist = True
skip_install = True
deps = tomte[darglint]==0.6.5
commands = darglint {env:SERVICE_SPECIFIC_PACKAGES}/*

[testenv:safety]
skipsdist = True
skip_install = True
deps =
    tomte[safety]==0.5.0
    typer==0.16.0
    marshmallow<4.0.0
    setuptools<=81.0.0
    httpx<0.28
    filelock>=3.20.1
commands = safety check -i 70612 -i 67599 -i 37524 -i 38038 -i 37776 -i 38039 -i 39621 -i 40291 -i 39706 -i 41002 -i 51358 -i 51499


[testenv:check-generate-all-protocols]
skipsdist = True
usedevelop = True
deps =
    tomte[isort]==0.6.5
    tomte[black]==0.6.5
commands = aea generate-all-protocols --check-clean

[testenv:abci-docstrings]
skipsdist = True
usedevelop = True
commands = autonomy analyse docstrings --update

[testenv:check-doc-hashes]
skipsdist = True
skip_install = True
commands =
    aea init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    aea packages sync
    aea-helpers check-doc-hashes

[testenv:check-abciapp-specs]
skipsdist = True
usedevelop = True
commands =  autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
            autonomy packages sync
            autonomy analyse fsm-specs

[testenv:spell-check]
whitelist_externals = mdspell
skipsdist = True
usedevelop = True
deps =
    tomte[cli]==0.6.5
commands = tomte check-spelling

[testenv:liccheck]
skipsdist = True
usedevelop = True
deps =
    pip
    tomte[liccheck,cli]==0.6.5
    setuptools<=81.0.0
commands =
    tomte freeze-dependencies --output-path {envtmpdir}/requirements.txt
    liccheck -s tox.ini -r {envtmpdir}/requirements.txt -l PARANOID


[flake8]
paths=packages/valory/connections/genai
exclude=.md,
    *_pb2.py,
    *_pb2_grpc.py,
    custom_types.py,

max-line-length = 88
select = B,C,D,E,F,I,W,
ignore = E203,E501,W503,D202,B014,D400,D401,DAR
application-import-names = packages,tests

# ignore as too restrictive for our needs:
# D400: First line should end with a period
# D401: First line should be in imperative mood
# E501: https://www.flake8rules.com/rules/E501.html (Line too long)
# E203: https://www.flake8rules.com/rules/E203.html (Whitespace)
# W503: https://www.flake8rules.com/rules/W503.html (Line break)
# D202: blank lines
# B014: redundant exception

[isort]
# for black compatibility
multi_line_output=3
include_trailing_comma=True
force_grid_wrap=0
use_parentheses=True
ensure_newline_before_comments = True
line_length=88
# custom configurations
order_by_type=False
case_sensitive=True
lines_after_imports=-1
skip=packages/valory/protocols,valory/skills/abstract_abci,valory/skills/reset_pause_abci,valory/skills/registration_abci,valory/skills/abstract_round_abci,valory/contracts/service_registry,valory/connections/abci,valory/connections/http_client,valory/connections/ipfs,valory/connections/ledger,valory/connections/p2p_libp2p_client,fetchai/connections/http_server,valory/contracts/gnosis_safe_proxy_factory,valory/contracts/gnosis_safe,valory/skills/transaction_settlement_abci,valory/contracts/multisend,valory/skills/termination_abci
skip_glob =
known_first_party=autonomy
known_packages=packages
known_local_folder=tests
sections=FUTURE,STDLIB,THIRDPARTY,FIRSTPARTY,PACKAGES,LOCALFOLDER

[mypy]
python_version = 3.12
strict_optional = True
exclude=(.*_pb2|.*custom_types)

# Before adding a module here, make sure it does not support type hints
# Per-module options for aea dir:

[mypy-aea.*]
ignore_missing_imports = True

[mypy-packages.open_aea.*]
ignore_errors=True

[mypy-toml.*]
ignore_missing_imports = True

[mypy-packages.valory.connections.*]
ignore_errors=True

[mypy-packages.valory.contracts.*]
ignore_errors=True

[mypy-packages.valory.protocols.*]
ignore_errors=True

[mypy-packages.valory.skills.abstract_abci.*]
ignore_errors=True

[mypy-packages.valory.skills.abstract_round_abci.*]
ignore_errors=True

[mypy-eth_abi.*]
ignore_errors=True
ignore_missing_imports= True

[mypy-packages.valory.skills.registration_abci.*]
ignore_errors=True

[mypy-requests]
ignore_missing_imports=True

[mypy-yaml]
ignore_missing_imports=True

[mypy-aea_test_autonomy.*]
ignore_missing_imports = True

[mypy-statsmodels.*]
ignore_missing_imports = True

[mypy-_pytest.*]
ignore_missing_imports = True

[mypy-aea_ledger_ethereum.*]
ignore_missing_imports=True

[mypy-ipfshttpclient.*]
