; By default, testenvs are configured to:
; - don't skip dist (skipsdist = False)
; - don't skip the package installation (skip_install = False)
; - don't use source installation (usedevelop = False)
; where one of those steps is not necessary for the test,
; we set the associated flag (e.g. for linting we don't need
; the package installation).
[tox]
envlist = bandit, safety, black, black-check, isort, isort-check, check-hash, check-packages, check-dependencies, flake8, mypy, pylint, darglint, check-generate-all-protocols, check-abciapp-specs, check-abci-docstrings, check-handlers, py{3.10,3.11,3.12,3.13,3.14}-{win,linux,darwin}
; when running locally we don't want to fail for no good reason
skip_missing_interpreters = true
isolated_build = True
uv_seed = true

[deps-tests]
deps =
    pip
    tomte[tests]==0.6.5

[deps-packages]
deps =
    {[deps-tests]deps}
    open-autonomy[all]==0.21.18
    requests<2.33.0,>=2.32.5
    py-multibase==1.0.3
    py-multicodec==0.2.1
    py-eth-sig-utils
    grpcio==1.78.0
    asn1crypto<1.5.0,>=1.4.0
    open-aea-ledger-ethereum==2.2.1
    open-aea-ledger-cosmos==2.2.1
    protobuf<6,>=5
    hypothesis==6.21.6
    open-aea-test-autonomy==0.21.18
    open-aea-helpers==0.21.18
    web3<8,>=7.0.0
    ipfshttpclient==0.8.0a2
    open-aea-cli-ipfs==2.2.1
    aiohttp<4.0.0,>=3.8.5
    certifi
    multidict
    ecdsa>=0.15
    eth_typing
    hexbytes==1.3.1
    packaging
    py-ecc==8.0.0
    pytz==2022.2.1
    typing_extensions>=4.13.2
    websocket_client<1,>=0.32.0
    toml==0.10.2
    pytest-asyncio
    eth-utils==5.3.0
    eth-abi==5.2.0
    pycryptodome==3.20.0
    google-generativeai==0.8.2
    pytest==8.4.2
    urllib3==1.26.16
    jsonschema<5.0.0,>=4.23.0
    openapi-core==0.22.0
    openapi-spec-validator<0.8.0,>=0.7.0
    click==8.1.8
    multiaddr==0.0.9
    httpx<1,>=0.23.0
    setuptools<=81.0.0
    openai==1.93.0

[deps-base]
deps ={[deps-packages]deps}

[testenv-multi-ubuntu]
deps = {[deps-base]deps}

[testenv-multi-win]
deps =
    {[deps-base]deps}
    pywin32==304
    websocket-client==0.59.0
    certifi==2021.10.8
    idna==3.3

[testenv-multi-darwin]
deps = {[deps-base]deps}

[extra-deps]
deps =
    attrs
    eth-account<0.14.0,>=0.13.0
    pydantic<3,>=2.11.9
    pyinstaller==6.19.0
    pyyaml<=6.0.1,>=3.10
    typing-extensions>=4.13.2
    werkzeug
; end-extra
[testenv]
basepython = python3
whitelist_externals = /bin/sh
passenv = *
extras = all
deps = {[deps-packages]deps}
setenv =
    UV_PRERELEASE=allow
    PYTHONHASHSEED=0
    PACKAGES_PATHS = packages
    SKILLS_PATHS = {env:PACKAGES_PATHS}/skills
    CONTRACTS_PATHS = {env:PACKAGES_PATHS}/contracts
    PROTOCOLS_PATHS = {env:PACKAGES_PATHS}/protocols
    CONNECTIONS_PATHS = {env:PACKAGES_PATHS}/connections
    SERVICE_SPECIFIC_PACKAGES = {env:PACKAGES_PATHS}/valory/connections/genai

commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync

[testenv:py3.10-linux]
basepython = python3.10
platform=^linux$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.11-linux]
